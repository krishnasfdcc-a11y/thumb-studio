<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid React Editor Core</title>
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Load React & ReactDOM without a build step -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <!-- Load Vanilla Canvas Core logic -->
    <script src="js/core.js"></script>
    
    <!-- Load Module System (order matters!) -->
    <script src="js/modules/state.js"></script>
    <script src="js/modules/worker-manager.js"></script>
    <script src="js/modules/segmentation.js"></script>
    
    <!-- Initialize modules -->
    <script>
        window.aiWorkerManager.initialize().catch(err => {
            console.error('Failed to initialize AI worker:', err);
        });
    </script>
    
    <!-- Tell Babel to process our React file -->
    <script type="text/babel" src="js/app.js"></script>
</body>
</html>
